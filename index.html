<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千曲市 防災マップ</title>
<style>
html,body{margin:0;height:100%;}
#map{width:100%;height:100%;}
.btn{
  position:fixed;top:10px;left:10px;z-index:10;
  background:#d62828;color:#fff;border:none;
  padding:10px 14px;border-radius:6px;
}
</style>
</head>
<body>

<button class="btn" onclick="getLocation()">現在地</button>
<div id="map"></div>

<script>
const GOOGLE_MAPS_API_KEY = 'AIzaSyB3rocTi9xiYXcxmI0TyMk3va5DA3tlmH0';

let map;

function initMap(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:36.53,lng:138.11},
    zoom:12
  });

  // 避難所
  const shelters=[
    {lat:36.5308,lng:138.1197,name:'千曲市役所'},
    {lat:36.4895,lng:138.1712,name:'戸倉体育館'}
  ];

  shelters.forEach(s=>{
    new google.maps.Marker({
      position:s,
      map:map,
      title:s.name
    });
  });
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const loc={
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    };

    new google.maps.Marker({
      position:loc,
      map:map,
      title:'現在地'
    });

    map.setCenter(loc);
    map.setZoom(14);
  });
}

const script=document.createElement('script');
script.src=`https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
script.async=true;
document.head.appendChild(script);
</script>

</body>
</html>
