<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千曲市 防災マップ AI</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

#map {
  width: 70%;
  height: 100%;
}

#chat {
  width: 30%;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg-user {
  background: #ef4444;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  text-align: right;
}

.msg-bot {
  background: #2563eb;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
}

#inputArea {
  display: flex;
}

#input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  background: red;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="input" placeholder="質問してください">
    <button onclick="send()">送信</button>
  </div>
</div>

<script>
const API_URL = 'https://digitalerapioneer.com/wp-json/bousai/v1/chat';

function addMessage(type, text) {
  const div = document.createElement('div');
  div.className = type === 'user' ? 'msg-user' : 'msg-bot';
  div.innerText = text;
  document.getElementById('messages').appendChild(div);
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value;
  if (!text) return;

  addMessage('user', text);
  input.value = '';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text })
    });

    const data = await res.json();

    addMessage('bot', data.answer || data.message || JSON.stringify(data));

  } catch (e) {
    addMessage('bot', '通信エラー');
  }
}
</script>

</body>
</html>
