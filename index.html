<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千曲市 防災マップ</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }
    .header {
      background: #d62828;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      border: none;
      border-radius: 20px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .btn-white {
      background: #fff;
      color: #d62828;
    }
    .status {
      padding: 10px;
      background: #f1f5f9;
    }
    #map {
      width: 100%;
      height: calc(100% - 100px);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="title">千曲市 防災マップ</div>
  <div class="actions">
    <button class="btn-white" onclick="getCurrentLocation()">現在地</button>
    <button class="btn-white" onclick="showNearestShelter()">避難所</button>
  </div>
</div>

<div class="status" id="statusText">読み込み中...</div>
<div id="map"></div>

<script>
const GOOGLE_MAPS_API_KEY = 'AIzaSyB3rocTi9xiYXcxmI0TyMk3va5DA3tlmH0';

let map;
let currentLocation = null;

const shelters = [
  { name: '千曲市役所', lat: 36.5308, lng: 138.1197 },
  { name: '戸倉体育館', lat: 36.4895, lng: 138.1712 }
];

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.53, lng: 138.11 },
    zoom: 12
  });

  shelters.forEach(s => {
    new google.maps.Marker({
      position: s,
      map,
      title: s.name
    });
  });

  setStatus('地図OK');
}

function loadMap() {
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
  script.async = true;
  document.head.appendChild(script);
}

function getCurrentLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };
    new google.maps.Marker({
      position: currentLocation,
      map,
      title: '現在地'
    });
    map.setCenter(currentLocation);
  });
}

function showNearestShelter() {
  if (!currentLocation) {
    alert('現在地を先に取得');
    return;
  }

  let nearest = shelters[0];
  let min = 999;

  shelters.forEach(s => {
    const d = Math.hypot(
      currentLocation.lat - s.lat,
      currentLocation.lng - s.lng
    );
    if (d < min) {
      min = d;
      nearest = s;
    }
  });

  alert(nearest.name);
}

loadMap();
</script>

</body>
</html>
