<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災マップ</title>
<style>
html,body{margin:0;height:100%;}
#map{width:100%;height:100%;}
.btn{
  position:fixed;top:10px;left:10px;z-index:10;
  background:#d62828;color:#fff;border:none;
  padding:10px 14px;border-radius:6px;
}
.btn2{
  position:fixed;top:50px;left:10px;z-index:10;
  background:#000;color:#fff;border:none;
  padding:10px 14px;border-radius:6px;
}
</style>
</head>
<body>

<button class="btn" onclick="getLocation()">現在地</button>
<button class="btn2" onclick="openAI()">AI相談</button>

<div id="map"></div>

<script>
const GOOGLE_MAPS_API_KEY = 'AIzaSyB3rocTi9xiYXcxmI0TyMk3va5DA3tlmH0';

let map;
let currentLocation = null;

function initMap(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:36.53,lng:138.11},
    zoom:12
  });
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLocation={
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    };

    new google.maps.Marker({
      position:currentLocation,
      map:map
    });

    map.setCenter(currentLocation);
    map.setZoom(14);
  });
}

function openAI(){
  if(!currentLocation){
    alert('先に現在地');
    return;
  }

  fetch('http://localhost:3000/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(currentLocation)
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.answer);
  })
  .catch(()=>{
    alert('AI接続失敗');
  });
}

const script=document.createElement('script');
script.src=`https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
script.async=true;
document.head.appendChild(script);
</script>

</body>
</html>
