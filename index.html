<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>千曲市 防災マップ AIアシスタント</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      background: #e11d24;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .header-left p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .location-btn {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 999px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .map-wrap {
      width: 70%;
      position: relative;
      background: #dbeafe;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .chat-wrap {
      width: 30%;
      min-width: 360px;
      background: #0b1220;
      border-left: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-top {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      color: #cbd5e1;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 16px 0;
    }

    .quick-buttons button {
      border: 1px solid rgba(255,255,255,0.12);
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .message {
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #ef233c;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: #2563eb;
      color: #fff;
      border-bottom-left-radius: 6px;
    }

    .message.system {
      align-self: center;
      background: #1f2937;
      color: #e5e7eb;
      font-size: 13px;
    }

    .input-wrap {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-wrap input {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.12);
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .send-btn {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: #ef233c;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }

    .typing {
      align-self: flex-start;
      background: #2563eb;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      gap: 6px;
      width: fit-content;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    @media (max-width: 960px) {
      .main {
        flex-direction: column;
      }

      .map-wrap,
      .chat-wrap {
        width: 100%;
        min-width: 0;
      }

      .map-wrap {
        height: 48%;
        min-height: 300px;
      }

      .chat-wrap {
        height: 52%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>千曲市 防災マップ AIアシスタント</h1>
        <p>GoogleマップとDifyを使った試作版</p>
      </div>
      <button class="location-btn" id="locationBtn">📍 現在地を取得</button>
    </div>

    <div class="main">
      <div class="map-wrap">
        <div id="map"></div>
      </div>

      <div class="chat-wrap">
        <div class="chat-top" id="statusText">準備中...</div>

        <div class="quick-buttons">
          <button onclick="sendPreset('近くの避難場所を教えて')">避難場所</button>
          <button onclick="sendPreset('気象警報が出たときの注意点は？')">気象警報</button>
          <button onclick="sendPreset('地震のときの初動は？')">地震対応</button>
          <button onclick="sendPreset('洪水のとき何に気をつければいい？')">洪水対応</button>
        </div>

        <div class="messages" id="chatArea"></div>

        <div class="input-wrap">
          <input id="userInput" type="text" placeholder="質問を入力してください">
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ここは WordPress 側のAPI
    const DIFY_API_URL = 'https://digitalerapioneer.com/wp-json/bousai/v1/chat';

    // ここはあなたの Google Maps API キーに置き換えてください
    const GOOGLE_MAPS_API_KEY = 'ここにGoogleMapsのAPIキー';

    let map;
    let currentLocation = null;
    let userMarker = null;
    let shelterMarkers = [];

    const shelters = [
      { name: '千曲市役所', lat: 36.5308, lng: 138.1197 },
      { name: '戸倉体育館', lat: 36.4895, lng: 138.1712 },
      { name: '更埴体育館', lat: 36.5208, lng: 138.1304 },
      { name: '上山田文化会館', lat: 36.4768, lng: 138.1676 },
      { name: '稲荷山公民館', lat: 36.5518, lng: 138.1219 }
    ];

    function setStatus(text) {
      document.getElementById('statusText').textContent = text;
    }

    function addMessage(type, text) {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addTyping() {
      const chatArea = document.getElementById('chatArea');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      chatArea.appendChild(typing);
      chatArea.scrollTop = chatArea.scrollHeight;
      return typing;
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 36.5308, lng: 138.1197 },
        zoom: 12,
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      shelterMarkers.forEach(marker => marker.setMap(null));
      shelterMarkers = [];

      shelters.forEach(shelter => {
        const marker = new google.maps.Marker({
          position: { lat: shelter.lat, lng: shelter.lng },
          map: map,
          title: shelter.name
        });

        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="color:#111;padding:4px 6px;"><strong>${shelter.name}</strong></div>`
        });

        marker.addListener('click', () => {
          infoWindow.open(map, marker);
        });

        shelterMarkers.push(marker);
      });

      setStatus('地図を表示しました');
      addMessage('bot', 'こんにちは。防災情報の案内をします。避難場所、地震、洪水などについて質問してください。');
    }

    function loadGoogleMaps() {
      if (!GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY === 'ここにGoogleMapsのAPIキー') {
        setStatus('Google Maps APIキーを設定してください');
        addMessage('system', 'Google Maps APIキーが未設定です。');
        return;
      }

      window.initMap = initMap;

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }

    function getCurrentLocation() {
      if (!navigator.geolocation) {
        addMessage('system', 'このブラウザは位置情報に対応していません。');
        return;
      }

      setStatus('現在地を取得中...');

      navigator.geolocation.getCurrentPosition(
        (position) => {
          currentLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          if (userMarker) {
            userMarker.setMap(null);
          }

          userMarker = new google.maps.Marker({
            position: currentLocation,
            map: map,
            title: '現在地',
            icon: {
              url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'
            }
          });

          map.setCenter(currentLocation);
          map.setZoom(14);

          setStatus('現在地を取得しました');
          addMessage('system', `現在地を取得しました（緯度: ${currentLocation.lat.toFixed(5)}, 経度: ${currentLocation.lng.toFixed(5)}）`);
        },
        () => {
          setStatus('現在地を取得できませんでした');
          addMessage('system', '位置情報の取得に失敗しました。');
        }
      );
    }

    function sendPreset(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }

    async function sendToDify(text) {
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      setStatus('AIに問い合わせ中...');

      const typingEl = addTyping();

      try {
        let query = text;

        if (currentLocation) {
          query += `

現在地情報:
- 緯度: ${currentLocation.lat}
- 経度: ${currentLocation.lng}
- 地域: 千曲市周辺を想定

地図上の避難所候補:
${shelters.map((s, i) => `${i + 1}. ${s.name}（緯度 ${s.lat}, 経度 ${s.lng}）`).join('\n')}

上記を踏まえて、ユーザーにわかりやすく日本語で案内してください。`;
        } else {
          query += `

地域は千曲市周辺を想定して回答してください。`;
        }

        const response = await fetch(DIFY_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            query: query
          })
        });

        const data = await response.json();
        typingEl.remove();

        if (!response.ok) {
          addMessage('bot', `エラー: ${response.status}`);
          setStatus(`エラー: ${response.status}`);
          return;
        }

        if (data.answer) {
          addMessage('bot', data.answer);
          setStatus('回答を取得しました');
        } else if (data.message) {
          addMessage('bot', data.message);
          setStatus('回答を取得しました');
        } else if (data.error) {
          addMessage('bot', typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
          setStatus('エラーが返されました');
        } else {
          addMessage('bot', JSON.stringify(data));
          setStatus('応答を取得しました');
        }

      } catch (error) {
        typingEl.remove();
        addMessage('bot', '通信エラー');
        setStatus('通信エラー');
      } finally {
        sendBtn.disabled = false;
      }
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();

      if (!text) return;

      addMessage('user', text);
      input.value = '';
      sendToDify(text);
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
    document.getElementById('locationBtn').addEventListener('click', getCurrentLocation);

    loadGoogleMaps();
  </script>
</body>
</html>
